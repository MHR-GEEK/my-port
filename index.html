<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammed Haris Raza – Portfolio</title>

    <!-- Inter font (Google) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
          rel="stylesheet">

    <!-- Optional pixel‑style font for the intro text -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- -------------------------------------------------
         FULL‑SCREEN BACKGROUND GIF
         ------------------------------------------------- -->
    <div class="background"></div>

    <!-- -------------------------------------------------
         INTRO SCREEN – click anywhere to enter
         ------------------------------------------------- -->
    <section id="intro" class="intro" aria-label="Intro screen">
        <div class="stars" id="stars"></div>

        <!-- Optional tiny GIF (remove the <img> line if you don’t have it) -->
        <img src="Images/sparkle.gif"
             alt=""
             class="intro-gif"
             onerror="this.style.display='none'">

        <h1 class="intro-title">Click&nbsp;|&nbsp;Anywhere</h1>
    </section>

    <!-- -------------------------------------------------
         MAIN PORTFOLIO – hidden until the user clicks
         ------------------------------------------------- -->
    <main id="content" class="content" aria-hidden="true">

        <header class="title">
            <h1>Mohammed Haris Raza</h1>
        </header>

        <!-- -------------------------------------------------
             CARD GRID – your navigation links
             ------------------------------------------------- -->
        <section class="grid">
            <a href="https://github.com/MHR-GEEK"
               class="card"
               target="_blank"
               rel="noopener">
                <h2>GitHub</h2>
            </a>

            <a href="https://www.instagram.com/md_haris_raza_/"
               class="card"
               target="_blank"
               rel="noopener">
                <h2>Instagram</h2>
            </a>

            <a href="https://mhr-pro.vercel.app/"
               class="card"
               target="_blank"
               rel="noopener">
                <h2>AI Dermatologist</h2>
            </a>

            <a href="https://aicoder-mhr.vercel.app/"
               class="card"
               target="_blank"
               rel="noopener">
                <h2>AI Coder</h2>
            </a>
        </section>

        <!-- -------------------------------------------------
             SPOTIFY PLAYER – replace the src with any track/playlist
             ------------------------------------------------- -->
        <section class="spotify-wrapper">
            <iframe
                src="https://open.spotify.com/embed/track/4iV5W9uYEdYUVa79Axb7Rh"
                width="100%"
                height="152"
                style="border:0;border-radius:12px;"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy">
            </iframe>
        </section>
    </main>

    <!-- -------------------------------------------------
         SCRIPTS – intro handling & star generation
         ------------------------------------------------- -->
    <script>
        /* -------------------------------------------------
           1️⃣ Click anywhere → fade out intro, reveal content
           ------------------------------------------------- */
        const intro   = document.getElementById('intro');
        const content = document.getElementById('content');

        intro.addEventListener('click', () => {
            intro.style.pointerEvents = 'none';
            intro.classList.add('fade-out');

            setTimeout(() => {
                intro.style.display = 'none';
                content.style.opacity = '1';
                content.setAttribute('aria-hidden', 'false');
            }, 1000); // matches CSS transition duration
        });

        /* -------------------------------------------------
           2️⃣ Generate twinkling stars (30 by default)
           ------------------------------------------------- */
        const starContainer = document.getElementById('stars');
        const STAR_COUNT = 30;

        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('span');
            star.classList.add('star');

            star.style.top  = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';

            const size = Math.random() * 4 + 2; // 2‑6 px
            star.style.width  = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDelay = Math.random() * 3 + 's';

            starContainer.appendChild(star);
        });
    </script>
</body>
</html>
